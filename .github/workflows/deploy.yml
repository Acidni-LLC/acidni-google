name: Deploy Acidni Google Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cracidnidev.azurecr.io
  IMAGE_NAME: acidni-google
  RESOURCE_GROUP: rg-dev-terprint-ca
  CONTAINER_APP: ca-acidni-google-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.ORG_AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name cracidnidev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Verify Deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Testing health endpoint: https://$FQDN/health"
          RETRIES=5
          DELAY=15
          for i in $(seq 1 $RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              echo "Service URL: https://$FQDN"
              exit 0
            fi
            echo "Attempt $i/$RETRIES: HTTP $HTTP_CODE - retrying in ${DELAY}s..."
            sleep $DELAY
          done
          echo "❌ Health check failed after $RETRIES attempts"
          exit 1
